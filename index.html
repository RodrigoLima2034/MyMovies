<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMovies - Sua Plataforma de Filmes</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modal.css">
    <link rel="stylesheet" href="./notie-master/dist/notie.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- ✅ FAVICON -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h2><i class="bi bi-film"></i> MyMovies</h2>

        <form id="search-container" autocomplete="off" onsubmit="return false;">
            <div class="input-nome-wrapper">
                <label for="movie-name"><i class="bi bi-search"></i> Nome:</label>
                <div class="input-icon-wrapper">
                    <input type="text" id="movie-name" placeholder="Digite o nome do filme">
                    <i class="bi bi-search search-icon"></i>
                </div>
            </div>
            <div class="input-year-wrapper">
                <label for="movie-year"><i class="bi bi-calendar"></i> Ano:</label>
                <input type="number" id="movie-year" placeholder="Ano" min="1888" max="2100">
            </div>
            <button id="search-button" type="button" title="Buscar Filme">
                <i class="bi bi-search"></i> Buscar
            </button>
        </form>
    </header>

    <!-- MAIN -->
    <main>
        <div id="api-container">
            <input type="text" id="api-key" placeholder="Digite sua API Key OMDb">
            <button id="save-key"><i class="bi bi-check-circle"></i> Salvar Key</button>
        </div>

        <div id="welcome-message">
            <i class="bi bi-emoji-smile"></i><br>
            Bem-vindo ao <b>MyMovies</b>!<br>
            Salve sua API Key OMDb, busque filmes e monte sua lista.<br>
            <span class="welcome-tip"><i class="bi bi-lightbulb"></i> Dica: Clique no card para ver o trailer!</span>
        </div>

        <section id="movie-list"></section>
        <div id="empty-list-placeholder">
            <i class="bi bi-film"></i><br>
            Sua lista está vazia. Busque e adicione filmes!
        </div>

        <!-- MODAL -->
        <article id="modal-overlay" class="overlay">
            <section id="modal-background"></section>
            <section id="modal-container"></section>
        </article>

        <!-- BOTÃO LIMPAR -->
        <button id="clear-button"><i class="bi bi-trash"></i> Limpar Tudo</button>
    </main>


    <!-- FOOTER -->
    <footer>
        <div class="footer-content">
            <div class="footer-info">
                <p><strong>© 2026 MyMovies</strong></p>
                <p>Desenvolvido por Rodrigo P. Lima</p>
            </div>
            <div class="footer-links">
                <a href="https://github.com/RodrigoLima2034?tab=repositories" target="_blank" rel="noopener noreferrer" title="GitHub">
                    <i class="bi bi-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/rodrigo-pereira-lima-268305170/" target="_blank" rel="noopener noreferrer" title="LinkedIn">
                    <i class="bi bi-linkedin"></i>
                </a>
            </div>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="./notie-master/dist/notie.min.js"></script>
    <script src="modal.js"></script>
    <script src="script.js"></script>

</body>

</html>
